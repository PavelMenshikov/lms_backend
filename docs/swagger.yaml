      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 'ADMIN: Запись на курс'
      tags:
      - Admin-Users
  /admin/groups:
    get:
      parameters:
      - description: ID потока (опционально)
        in: query
        name: stream_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK

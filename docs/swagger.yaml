host: platform.capedu.kz
info:
  contact: {}
  description: API для LMS платформы Cap Education.
  title: Cap Education LMS - API
  version: "1.0"
paths:
  /admin/courses:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Course'
            type: array
      summary: 'ADMIN: Список всех курсов'
      tags:
      - Admin-Content
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Название курса
        in: formData
        name: title
        required: true
        type: string
      - description: Описание курса
        in: formData
        name: description
        type: string
      - description: Флаг основного курса (true/false)
        in: formData
        name: is_main
        type: boolean
      - description: Изображение обложки курса
        in: formData
        name: image_file
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: id
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 'ADMIN: Создание нового курса'
      tags:
      - Admin-Content
  /admin/courses/{id}/enroll/{user_id}:
    delete:
      responses: {}
      summary: 'ADMIN: Удалить ученика с курса'
      tags:
      - Admin-Users
  /admin/courses/{id}/settings:
    put:
      consumes:
      - multipart/form-data
      description: Редактирование параметров курса (ДЗ, Тесты, Discord) и загрузка
        новой обложки.
      parameters:
      - description: ID курса
        in: path
        name: id
        required: true
        type: string
      - description: Название курса
        in: formData
        name: title
        type: string
      - description: Описание курса
        in: formData
        name: description
        type: string
      - description: Основной курс
        in: formData
        name: is_main
        type: boolean
      - description: Статус (draft, active, archived)
        in: formData
        name: status
        type: string
      - description: Включить домашние задания
        in: formData
        name: has_homework
        type: boolean
      - description: ДЗ обязательно для прохода дальше
        in: formData
        name: is_homework_mandatory
        type: boolean
      - description: Тесты обязательны
        in: formData
        name: is_test_mandatory
        type: boolean
      - description: Проекты обязательны
        in: formData
        name: is_project_mandatory
        type: boolean
      - description: Discord обязателен
        in: formData
        name: is_discord_mandatory
        type: boolean
      - description: Защита от копирования
        in: formData
        name: is_anti_copy_enabled
        type: boolean
      - description: Новая обложка курса
        in: formData
        name: cover_image
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: 'status: updated'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 'ADMIN: Обновление настроек курса'
      tags:
      - Admin-Content
  /admin/courses/{id}/stats:
    get:
      parameters:
      - description: ID курса
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.AdminCourseStats'
      summary: 'ADMIN: Статистика курса'
      tags:
      - Admin-Stats
  /admin/courses/{id}/structure:
    get:
      parameters:
      - description: ID курса
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.CourseStructure'
      summary: 'ADMIN: Содержание курса (Дерево)'
      tags:
      - Admin-Content
  /admin/courses/{id}/students:
    get:
      parameters:
      - description: ID курса
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.AdminStudentProgress'
            type: array
      summary: 'ADMIN: Ученики конкретного курса'
      tags:
      - Admin-Users
  /admin/courses/bulk:
    post:
      consumes:
      - application/json
      parameters:
      - description: Структура курса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/usecase.CreateBulkCourseInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:

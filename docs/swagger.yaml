      responses:
        "200":
          description: id
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 'ADMIN: Создать группу'
      tags:
      - Admin-Staff
  /admin/lessons:
    post:
      consumes:
      - application/json
      - multipart/form-data
      description: Создание урока. Можно слать JSON (для блочного контента) или multipart/form-data
        (для старой загрузки файлов).
      parameters:
      - description: Данные урока (JSON)
        in: body
        name: request
        schema:
          $ref: '#/definitions/http.CreateLessonRequest'
      - description: Видео файл (только для multipart)
        in: formData
        name: video_file
        type: file
      - description: Презентация (только для multipart)
        in: formData
        name: presentation_file
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: id
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 'ADMIN: Добавление урока'
      tags:
      - Admin-Content
  /admin/lessons/{id}:
    delete:
      parameters:
      - description: Lesson ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
      summary: 'ADMIN: Удаление урока'
      tags:
      - Admin-Content
    get:
      parameters:
      - description: Lesson ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Lesson'
      summary: 'ADMIN: Получить данные урока для редактора'

host: test.xcx.cx
info:
  contact: {}
  description: API для LMS платформы Cap Education.
  title: Cap Education LMS - API
  version: "1.0"
paths:
  /admin/courses:
    get:
      description: Получение краткого списка всех существующих курсов.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Course'
            type: array
      summary: 'ADMIN: Список всех курсов'
      tags:
      - Admin-Content
    post:
      consumes:
      - multipart/form-data
      description: Создает карточку курса с загрузкой изображения.
      parameters:
      - description: Название курса
        in: formData
        name: title
        required: true
        type: string
      - description: Описание курса
        in: formData
        name: description
        type: string
      - description: Флаг основного курса (true/false)
        in: formData
        name: is_main
        type: boolean
      - description: Изображение обложки курса
        in: formData
        name: image_file
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: id
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 'ADMIN: Создание нового курса'
      tags:
      - Admin-Content
  /admin/courses/{id}/settings:
    put:
      consumes:
      - multipart/form-data
      description: Редактирование флагов (ДЗ, Тесты, Discord), статусов и обложки.
      parameters:
      - description: ID курса
        in: path
        name: id
        required: true
        type: string
      - description: Название
        in: formData
        name: title
        type: string
      - description: Описание
        in: formData
        name: description
        type: string
      - description: Основной
        in: formData
        name: is_main
        type: boolean
      - description: Статус
        in: formData
        name: status
        type: string
      - description: Новая обложка
        in: formData
        name: cover_image
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: status
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 'ADMIN: Обновление настроек курса'
      tags:
      - Admin-Content
  /admin/courses/{id}/stats:
    get:
      description: Агрегированные метрики по курсу (кол-во, успеваемость).
      parameters:
      - description: ID курса
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.AdminCourseStats'
      summary: 'ADMIN: Статистика курса'
      tags:
      - Admin-Stats
  /admin/courses/{id}/structure:
    get:
      description: Возвращает иерархию Модули -> Уроки для конкретного курса.
      parameters:
      - description: ID курса
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.CourseStructure'
      summary: 'ADMIN: Содержание курса (Дерево)'
      tags:
      - Admin-Content
  /admin/courses/{id}/students:
    get:
      description: Краткий список учеников с их прогрессом.
      parameters:
      - description: ID курса
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.AdminStudentProgress'
            type: array
      summary: 'ADMIN: Ученики конкретного курса'
      tags:
      - Admin-Users
  /admin/dashboard/stats:
    get:
      description: Возвращает агрегированные данные для админ-панели (счетчики, графики,
        успеваемость).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.AdminHomeDashboard'
      summary: 'ADMIN: Статистика главной страницы'
      tags:
      - Admin-Stats
  /admin/enroll:
    post:
      consumes:
      - application/json
      description: Привязка существующего ученика к курсу.
      parameters:
      - description: UserID и CourseID
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.EnrollRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 'ADMIN: Запись на курс'
      tags:
      - Admin-Users
  /admin/groups:
    get:
      parameters:
      - description: ID потока
        in: query
        name: stream_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Group'
            type: array
      summary: 'ADMIN: Список групп потока'
      tags:
      - Admin-Staff
    post:
      consumes:
      - application/json
      description: Создание группы внутри потока, назначение куратора и учителя.
      parameters:
      - description: Данные группы
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.CreateGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: id
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 'ADMIN: Создать группу'
      tags:
      - Admin-Staff
  /admin/lessons:
    post:
      consumes:
      - multipart/form-data
      description: Создает урок с опциональной загрузкой видео и презентации.
      parameters:
      - description: ID модуля
        in: formData
        name: module_id
        required: true
        type: string
      - description: ID преподавателя (лектора)
        in: formData
        name: teacher_id
        required: true
        type: string
      - description: Название урока
        in: formData
        name: title
        required: true
        type: string
      - description: Порядковый номер в модуле
        in: formData
        name: order_num
        required: true
        type: integer
      - description: Markdown/HTML конспект
        in: formData
        name: content_text
        type: string
      - description: Видео файл
        in: formData
        name: video_file
        type: file
      - description: Файл презентации
        in: formData
        name: presentation_file
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: id
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 'ADMIN: Добавление урока'
      tags:
      - Admin-Content
  /admin/media/upload:
    post:
      consumes:
      - multipart/form-data
      description: Загружает произвольный файл в S3 (для использования в редакторе
        контента).
      parameters:
      - description: Файл для загрузки
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: url
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 'ADMIN: Загрузка медиа-файла'
      tags:
      - Admin-Content
